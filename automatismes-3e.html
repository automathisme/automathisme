<style>
:root {
  --c-bg: #f4f7fb;
  --c-card: #ffffff;
  --c-primary: #6366f1;
  --c-primary-dark: #4f46e5;
  --c-accent: #f59e0b;
  --c-success: #10b981;
  --c-error: #ef4444;
  --c-text: #1f2937;
  --c-muted: #6b7280;
  --c-border: #e5e7eb;
  --c-cat-nc: #6366f1;
  --c-cat-geo: #10b981;
  --c-cat-stat: #f59e0b;
  --c-cat-prop: #ec4899;
  --c-cat-algo: #8b5cf6;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.5;
}
header {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  color: white;
  padding: 24px 20px;
  box-shadow: 0 4px 20px rgba(99,102,241,0.25);
}
header h1 {
  margin: 0 0 8px;
  font-size: 28px;
  font-weight: 800;
}
header p {
  margin: 0;
  opacity: 0.95;
  font-size: 15px;
}
nav.menu {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  background: white;
  padding: 12px 20px;
  border-bottom: 2px solid var(--c-border);
  position: sticky;
  top: 50px;
  z-index: 99;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
nav.menu button {
  background: var(--c-bg);
  border: 2px solid transparent;
  padding: 10px 18px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--c-text);
  transition: all 0.2s;
}
nav.menu button:hover { background: #e0e7ff; }
nav.menu button.active {
  background: var(--c-primary);
  color: white;
  border-color: var(--c-primary-dark);
}
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
.hero {
  background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 24px;
  border: 3px solid #fbbf24;
}
.hero h2 { margin-top: 0; font-size: 24px; }
.hero p { margin: 10px 0; font-size: 16px; }
.hero .actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.btn {
  border: none;
  padding: 12px 22px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s;
  font-family: inherit;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.12); }
.btn-primary { background: var(--c-primary); color: white; }
.btn-accent { background: var(--c-accent); color: white; }
.btn-success { background: var(--c-success); color: white; }
.btn-ghost { background: white; color: var(--c-text); border: 2px solid var(--c-border); }

.cat-section { margin-bottom: 32px; }
.cat-title {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 800;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 16px;
}
.cat-nc   { background: var(--c-cat-nc); }
.cat-geo  { background: var(--c-cat-geo); }
.cat-stat { background: var(--c-cat-stat); }
.cat-prop { background: var(--c-cat-prop); }
.cat-algo { background: var(--c-cat-algo); }

.theme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.theme-card {
  background: white;
  border-radius: 16px;
  padding: 18px;
  cursor: pointer;
  border: 2px solid var(--c-border);
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.theme-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.1);
  border-color: var(--c-primary);
}
.theme-card .icon { font-size: 32px; }
.theme-card .name { font-weight: 700; font-size: 15px; }
.theme-card .nb { font-size: 12px; color: var(--c-muted); }
.theme-card .actions { display: flex; gap: 8px; margin-top: 10px; }
.theme-card .actions button {
  flex: 1;
  padding: 8px 10px;
  border: none;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.theme-card .btn-quiz { background: var(--c-primary); color: white; }
.theme-card .btn-lesson { background: #fef3c7; color: #92400e; }

.card {
  background: var(--c-card);
  border-radius: 18px;
  padding: 28px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.05);
  margin-bottom: 18px;
}
.back-btn {
  background: none;
  border: none;
  color: var(--c-primary);
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
  padding: 6px 0;
  margin-bottom: 12px;
  font-family: inherit;
}
.back-btn:hover { text-decoration: underline; }

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 10px;
}
.quiz-progress {
  background: var(--c-bg);
  border-radius: 999px;
  height: 10px;
  overflow: hidden;
  flex: 1;
  min-width: 150px;
}
.quiz-progress > div {
  height: 100%;
  background: linear-gradient(90deg, var(--c-primary), var(--c-accent));
  transition: width 0.3s;
}
.quiz-score {
  font-weight: 800;
  font-size: 16px;
  color: var(--c-primary);
}
.question-num {
  font-size: 13px;
  color: var(--c-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
}
.question-text {
  font-size: 20px;
  font-weight: 600;
  margin: 0 0 20px;
  line-height: 1.5;
}
.choices {
  display: grid;
  gap: 10px;
}
.choice {
  background: white;
  border: 2px solid var(--c-border);
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 16px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: all 0.15s;
}
.choice:hover:not(:disabled) {
  border-color: var(--c-primary);
  background: #f5f3ff;
}
.choice:disabled { cursor: default; }
.choice.correct {
  background: #d1fae5;
  border-color: var(--c-success);
  color: #064e3b;
  font-weight: 700;
}
.choice.wrong {
  background: #fee2e2;
  border-color: var(--c-error);
  color: #7f1d1d;
}
.feedback {
  margin-top: 20px;
  padding: 16px 20px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.6;
  border-left: 5px solid var(--c-primary);
  background: #eef2ff;
}
.feedback.ok {
  background: #ecfdf5;
  border-left-color: var(--c-success);
}
.feedback.ko {
  background: #fef2f2;
  border-left-color: var(--c-error);
}
.feedback strong { font-weight: 800; }
.feedback .badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  margin-right: 8px;
  letter-spacing: 0.5px;
}
.feedback.ok .badge { background: var(--c-success); color: white; }
.feedback.ko .badge { background: var(--c-error); color: white; }
.next-btn {
  margin-top: 16px;
  background: var(--c-primary);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.next-btn:hover { background: var(--c-primary-dark); }

.lesson h2 { margin-top: 0; color: var(--c-primary-dark); }
.lesson h3 { color: var(--c-primary); margin-top: 24px; }
.lesson .method {
  background: #eef2ff;
  padding: 16px 20px;
  border-radius: 12px;
  border-left: 5px solid var(--c-primary);
  margin: 14px 0;
}
.lesson .example {
  background: #fef3c7;
  padding: 14px 18px;
  border-radius: 12px;
  border-left: 5px solid var(--c-accent);
  margin: 12px 0;
}
.lesson .tip {
  background: #ecfdf5;
  padding: 14px 18px;
  border-radius: 12px;
  border-left: 5px solid var(--c-success);
  margin: 12px 0;
}
.lesson table {
  border-collapse: collapse;
  margin: 12px 0;
  width: auto;
}
.lesson table th, .lesson table td {
  border: 1px solid var(--c-border);
  padding: 6px 12px;
  text-align: center;
}
.lesson table th { background: #eef2ff; }

.result {
  text-align: center;
  padding: 30px 20px;
}
.result .score-big {
  font-size: 64px;
  font-weight: 900;
  color: var(--c-primary);
  margin: 10px 0;
}
.result .medal { font-size: 80px; margin: 10px 0; }
.result .msg { font-size: 18px; margin-bottom: 20px; }
.result .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.list-skills {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin: 14px 0;
}
.fig-wrap {
  display: flex;
  justify-content: center;
  margin: 16px 0;
}
.fig {
  max-width: 100%;
  height: auto;
  background: #fafafa;
  border: 1px solid var(--c-border);
  border-radius: 10px;
  padding: 10px;
  font-family: "Georgia", serif;
}
.fig-q {
  max-width: 280px;
  height: auto;
  display: block;
  margin: 8px auto 14px;
  background: #fafafa;
  border: 1px solid var(--c-border);
  border-radius: 8px;
  padding: 6px;
  font-family: "Georgia", serif;
}
.fig text { font-style: italic; }
.fig .pt { fill: #1f2937; }
.fig .lbl { fill: #1f2937; font-style: italic; font-weight: bold; }
.fig .ang-arc { fill: none; stroke: #6366f1; stroke-width: 2; }
.fig .ang-lbl { fill: #6366f1; font-weight: 600; }
.fig .seg-lbl { fill: #ef4444; font-weight: 600; font-style: italic; }
.fig .axis { stroke: #333; stroke-width: 1.5; }
.fig .grid { stroke: #d1d5db; stroke-width: 0.5; }
.fig .ref { stroke: #ef4444; stroke-dasharray: 3,3; stroke-width: 1; }

<script>
// ==========================================================================
//   BANQUE DE THÈMES — leçons et questions

const THEMES = {};
// Les thèmes seront injectés via les blocs ci-dessous (themes-data.js inline)
</script>

<!-- ====== INJECTION DES THÈMES ====== -->
<script id="themes-data">
// ========================================================================
//  NOMBRES ET CALCULS
// ========================================================================
Object.assign(THEMES, {

  fractions_simplifier: {
    titre: "Simplifier une fraction",
    categorie: "nc",
    icone: "➗",
    lecon: { contenu: `
      <h3>Méthode</h3>
      <div class="method">
        <p><strong>Propriété :</strong> un quotient ne change pas si on multiplie ou divise son numérateur <em>et</em> son dénominateur par un même nombre non nul.</p>
        <p>Pour <strong>simplifier</strong> une fraction, on divise son numérateur et son dénominateur par un même nombre (autre que 1).</p>
        <p>Une fraction est <strong>irréductible</strong> quand on ne peut plus la simplifier.</p>
      </div>
      <h3>Exemples</h3>
      <div class="example">
        $$\\frac{15}{35} = \\frac{15 \\div 5}{35 \\div 5} = \\frac{3}{7}$$
        Ici, on divise par 5 (diviseur commun à 15 et 35).
      </div>
      <div class="example">
        $$\\frac{48}{60} = \\frac{48 \\div 12}{60 \\div 12} = \\frac{4}{5}$$
        On peut aussi simplifier en plusieurs étapes : $\\frac{48}{60} = \\frac{24}{30} = \\frac{12}{15} = \\frac{4}{5}$.
      </div>
      <div class="tip">💡 <strong>Astuce :</strong> écrire le numérateur et le dénominateur en produits permet de repérer les facteurs communs : $\\frac{15}{35} = \\frac{3 \\times 5}{7 \\times 5} = \\frac{3}{7}$.</div>
    ` },
    questions: [
      { enonce: "Simplifier $\\dfrac{15}{35}$.", choix: ["$\\dfrac{3}{7}$","$\\dfrac{5}{7}$","$\\dfrac{1}{2}$","$\\dfrac{15}{30}$"], bonne: 0,
        explication: "On divise par 5 : $\\dfrac{15}{35}=\\dfrac{3\\times 5}{7\\times 5}=\\dfrac{3}{7}$." },
      { enonce: "Simplifier $\\dfrac{24}{36}$.", choix: ["$\\dfrac{2}{3}$","$\\dfrac{3}{4}$","$\\dfrac{1}{2}$","$\\dfrac{4}{6}$"], bonne: 0,
        explication: "On divise par 12 : $\\dfrac{24}{36}=\\dfrac{2}{3}$." },
      { enonce: "Simplifier $\\dfrac{42}{56}$.", choix: ["$\\dfrac{6}{8}$","$\\dfrac{3}{4}$","$\\dfrac{7}{8}$","$\\dfrac{2}{3}$"], bonne: 1,
        explication: "On divise par 14 : $\\dfrac{42}{56}=\\dfrac{3}{4}$." },
      { enonce: "Forme irréductible de $\\dfrac{18}{27}$ ?", choix: ["$\\dfrac{6}{9}$","$\\dfrac{2}{3}$","$\\dfrac{3}{5}$","$\\dfrac{9}{14}$"], bonne: 1,
        explication: "$\\dfrac{18}{27}=\\dfrac{2\\times 9}{3\\times 9}=\\dfrac{2}{3}$." },
      { enonce: "Forme irréductible de $\\dfrac{50}{100}$ ?", choix: ["$\\dfrac{5}{10}$","$\\dfrac{1}{2}$","$\\dfrac{25}{50}$","$\\dfrac{2}{4}$"], bonne: 1,
        explication: "$\\dfrac{50}{100}=\\dfrac{1}{2}$ (on divise par 50)." },
      { enonce: "Simplifier $\\dfrac{45}{60}$.", choix: ["$\\dfrac{3}{4}$","$\\dfrac{9}{12}$","$\\dfrac{15}{30}$","$\\dfrac{6}{10}$"], bonne: 0,
        explication: "$\\dfrac{45}{60}=\\dfrac{45\\div 15}{60\\div 15}=\\dfrac{3}{4}$." },
      { enonce: "Simplifier $\\dfrac{84}{98}$.", choix: ["$\\dfrac{12}{14}$","$\\dfrac{3}{4}$","$\\dfrac{6}{7}$","$\\dfrac{7}{3}$"], bonne: 2,
        explication: "$\\dfrac{84}{98}=\\dfrac{84\\div 14}{98\\div 14}=\\dfrac{6}{7}$." },
      { enonce: "Simplifier $\\dfrac{120}{150}$.", choix: ["$\\dfrac{5}{6}$","$\\dfrac{3}{5}$","$\\dfrac{5}{4}$","$\\dfrac{4}{5}$"], bonne: 3,
        explication: "$\\dfrac{120}{150}=\\dfrac{120\\div 30}{150\\div 30}=\\dfrac{4}{5}$." },
      { enonce: "Simplifier $\\dfrac{75}{125}$.", choix: ["$\\dfrac{5}{12}$","$\\dfrac{5}{3}$","$\\dfrac{7}{5}$","$\\dfrac{3}{5}$"], bonne: 3,
        explication: "$\\dfrac{75}{125}=\\dfrac{75\\div 25}{125\\div 25}=\\dfrac{3}{5}$." },
      { enonce: "Simplifier $\\dfrac{64}{80}$.", choix: ["$\\dfrac{4}{5}$","$\\dfrac{8}{10}$","$\\dfrac{2}{3}$","$\\dfrac{3}{4}$"], bonne: 0,
        explication: "$\\dfrac{64}{80}=\\dfrac{64\\div 16}{80\\div 16}=\\dfrac{4}{5}$." },
      { enonce: "Simplifier $\\dfrac{72}{90}$.", choix: ["$\\dfrac{8}{10}$","$\\dfrac{4}{5}$","$\\dfrac{7}{9}$","$\\dfrac{9}{8}$"], bonne: 1,
        explication: "$\\dfrac{72}{90}=\\dfrac{72\\div 18}{90\\div 18}=\\dfrac{4}{5}$." },

      <h3>Méthode</h3>
      <div class="method">
        <p>Quand on a une situation d'<strong>équiprobabilité</strong> (toutes les issues ont la même chance d'apparaître), la probabilité d'un événement vaut :</p>
        $$P(\\text{événement}) = \\frac{\\text{nombre de cas favorables}}{\\text{nombre de cas possibles}}$$
        <p>Une probabilité est toujours un nombre entre 0 et 1.</p>
        <p>$P=0$ : impossible. $P=1$ : certain.</p>

      <h3>Exemples</h3>
      <div class="example">

        <p>"Ajouter 4 puis multiplier par 3" → $3(x+4)=3x+12$.</p>
      </div>
      <div class="tip">💡 L'ordre des opérations compte ! "$\\times 2$ puis $+3$" donne $2x+3$ alors que "$+3$ puis $\\times 2$" donne $2(x+3)=2x+6$.</div>
    ` },
    questions: [
      { enonce: "Programme : « Choisir un nombre, le multiplier par 4, ajouter 7. » Avec 3, on obtient :", choix: ["12","15","19","22"], bonne: 2, explication: "$3\\times 4=12$, puis $12+7=19$." },
      { enonce: "Programme : « Ajouter 5, multiplier par 2. » Avec 6 :", choix: ["11","17","22","30"], bonne: 2, explication: "$6+5=11$, puis $11\\times 2=22$." },
      { enonce: "Programme : « Multiplier par 3, ajouter 2. » Expression pour $x$ :", choix: ["$3x+2$","$3(x+2)$","$x+5$","$5x$"], bonne: 0, explication: "Multiplier par 3 puis ajouter 2 : $3x+2$." },
      { enonce: "Programme : « Ajouter 4, multiplier par 5. » Expression pour $x$ :", choix: ["$5x+4$","$5(x+4)$","$x+20$","$9x$"], bonne: 1, explication: "On parenthèse l'ajout : $5(x+4)$." },
      { enonce: "« Multiplier par 2, retrancher 6. » Avec 8 :", choix: ["10","16","22","2"], bonne: 0, explication: "$8\\times 2=16$, puis $16-6=10$." },
      { enonce: "« Soustraire 3, puis multiplier par 4. » Avec 10 :", choix: ["28","31","37","40"], bonne: 0, explication: "$10-3=7$, puis $7\\times 4=28$." },
      { enonce: "« Prendre le carré, ajouter 1. » Avec 5 :", choix: ["11","26","30","36"], bonne: 1, explication: "$5^2=25$, puis $25+1=26$." },
      { enonce: "Programme : « Doubler puis ajouter 3. » Pour quel nombre obtient-on 11 ?", choix: ["3","4","5","8"], bonne: 1, explication: "$2x+3=11 \\Rightarrow 2x=8 \\Rightarrow x=4$." },
      { enonce: "Quelle expression pour : « Diviser par 2, ajouter 5 » ?", choix: ["$\\dfrac{x}{2}+5$","$\\dfrac{x+5}{2}$","$2x+5$","$\\dfrac{x}{7}$"], bonne: 0, explication: "Divisé d'abord, puis ajouté." },
      { enonce: "Programme : « Ajouter 3, élever au carré. » Pour $x=2$ :", choix: ["7","13","25","11"], bonne: 2, explication: "$2+3=5$, puis $5^2=25$." }
    ]
  }

});

// ========================================================================
//  FIN DES DONNÉES
// ========================================================================
</script>

<script>
// ==========================================================================
//   MOTEUR : VUES, NAVIGATION, QUIZ
// ==========================================================================
const app = document.getElementById('app');
const menuBtns = document.querySelectorAll('nav.menu button');

const CATEGORIES = {
  "nc":   { nom: "Nombres et calculs",        cls: "cat-nc" },
  "geo":  { nom: "Espace et géométrie",       cls: "cat-geo" },
  "stat": { nom: "Données et probabilités",   cls: "cat-stat" },
  "prop": { nom: "Proportionnalité & fonctions", cls: "cat-prop" },
  "algo": { nom: "Algorithmique",             cls: "cat-algo" }
};

let state = {
  view: 'home',
  currentTheme: null,
  questions: [],
  qIndex: 0,
  score: 0,
  answered: false
};

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions(theme, n = 10) {
  const all = theme.questions || [];
  return shuffle(all).slice(0, Math.min(n, all.length));
}

function renderMath() {
  if (window.renderMathInElement) {
    renderMathInElement(app, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$',  right: '$',  display: false }
      ],
      throwOnError: false
    });
  }
}

function setView(view, themeKey = null, mode = null) {
  state.view = view;
  state.currentTheme = themeKey;
  menuBtns.forEach(b => b.classList.toggle('active', b.dataset.view === view));
  if (view === 'home') renderHome();
  else if (view === 'quiz' && !themeKey) renderThemePicker('quiz');
  else if (view === 'quiz' && themeKey) startQuiz(themeKey);
  else if (view === 'lessons' && !themeKey) renderThemePicker('lessons');
  else if (view === 'lessons' && themeKey) renderLesson(themeKey);
  else if (view === 'random') startRandomQuiz();
  window.scrollTo(0, 0);
  renderMath();
}

menuBtns.forEach(b => {
  b.addEventListener('click', () => setView(b.dataset.view));
});

function groupByCategory() {
  const grouped = {};
  Object.entries(THEMES).forEach(([key, t]) => {
    if (!grouped[t.categorie]) grouped[t.categorie] = [];
    grouped[t.categorie].push([key, t]);
  });
  return grouped;
}

// -------------- VUE : ACCUEIL --------------
function renderHome() {
  const nbThemes = Object.keys(THEMES).length;
  const nbQuestions = Object.values(THEMES).reduce((s, t) => s + (t.questions ? t.questions.length : 0), 0);
  app.innerHTML = `
    <div class="hero">
      <h2>Bienvenue !</h2>
      <p>Ce site rassemble tous les <strong>automatismes</strong> au programme du DNB pour les classes de 3<sup>e</sup>.</p>
      <p>Pour chaque thème, tu trouveras :</p>
      <ul>
        <li>📘 Une <strong>leçon</strong> claire avec la méthode et des exemples corrigés</li>
        <li>🎯 Un <strong>quiz</strong> tiré au hasard dans une banque de questions, avec correction détaillée</li>
        <li>🎲 Un <strong>quiz surprise</strong> qui mélange tous les thèmes pour réviser</li>
      </ul>
      <div class="actions">
        <button class="btn btn-primary" onclick="setView('quiz')">🎯 Choisir un quiz</button>
        <button class="btn btn-accent" onclick="setView('lessons')">📘 Voir les leçons</button>
        <button class="btn btn-success" onclick="setView('random')">🎲 Quiz surprise</button>
      </div>
      <p style="margin-top:18px;font-size:13px;color:#92400e;">
        ${nbThemes} thèmes · ${nbQuestions} questions disponibles
      </p>
    </div>
    ${renderCategoriesOverview()}
  `;
}

function renderCategoriesOverview() {
  const grouped = groupByCategory();
  return Object.entries(grouped).map(([catKey, items]) => {
    const cat = CATEGORIES[catKey];
    if (!cat) return '';
    return `
      <div class="cat-section">
        <div class="cat-title ${cat.cls}">${cat.nom}</div>
        <div class="theme-grid">
          ${items.map(([key, t]) => `
            <div class="theme-card">
              <div class="icon">${t.icone || '✏️'}</div>
              <div class="name">${t.titre}</div>
              <div class="nb">${t.questions ? t.questions.length : 0} questions dans la banque</div>
              <div class="actions">
                <button class="btn-quiz" onclick="setView('quiz','${key}')">🎯 Quiz</button>
                <button class="btn-lesson" onclick="setView('lessons','${key}')">📘 Leçon</button>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

// -------------- VUE : SÉLECTION D'UN THÈME --------------
function renderThemePicker(mode) {
  const grouped = groupByCategory();
  const action = mode === 'quiz' ? 'quiz' : 'lessons';
  const txt = mode === 'quiz' ? 'Choisis un thème pour le quiz' : 'Choisis une leçon';
  app.innerHTML = `
    <div class="card">
      <h2 style="margin-top:0">${txt}</h2>
      ${Object.entries(grouped).map(([catKey, items]) => {
        const cat = CATEGORIES[catKey];
        if (!cat) return '';
        return `
          <div class="cat-section">
            <div class="cat-title ${cat.cls}">${cat.nom}</div>
            <div class="theme-grid">
              ${items.map(([key, t]) => `
                <div class="theme-card" onclick="setView('${action}','${key}')">
                  <div class="icon">${t.icone || '✏️'}</div>
                  <div class="name">${t.titre}</div>
                  <div class="nb">${mode === 'quiz' ? (t.questions ? t.questions.length : 0) + ' questions' : 'Méthode et exemples'}</div>
                </div>`).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

// -------------- VUE : LEÇON --------------
function renderLesson(themeKey) {
  const t = THEMES[themeKey];
  if (!t) { app.innerHTML = '<div class="card">Thème introuvable.</div>'; return; }
  const lecon = t.lecon || { contenu: '<p>Leçon en cours de rédaction.</p>' };
  app.innerHTML = `
    <button class="back-btn" onclick="setView('lessons')">← Retour à la liste des leçons</button>
    <div class="card lesson">
      <h2>${t.icone || '📘'} ${t.titre}</h2>
      <div>${lecon.contenu || ''}</div>
      <div style="margin-top:24px;text-align:center">
        <button class="btn btn-primary" onclick="setView('quiz','${themeKey}')">🎯 S'entraîner avec un quiz</button>
      </div>
    </div>
  `;
}

// -------------- VUE : QUIZ --------------
function startQuiz(themeKey, nbQuestions = 10) {
  const t = THEMES[themeKey];
  if (!t) { app.innerHTML = '<div class="card">Thème introuvable.</div>'; return; }
  state.currentTheme = themeKey;
  state.questions = pickQuestions(t, nbQuestions);
  state.qIndex = 0;
  state.score = 0;
  state.answered = false;
  if (state.questions.length === 0) {
    app.innerHTML = `<div class="card"><p>Pas encore de questions disponibles pour ce thème.</p>
      <button class="btn btn-ghost" onclick="setView('quiz')">← Choisir un autre thème</button></div>`;
    return;
  }
  renderQuestion();
}

function startRandomQuiz(nbQuestions = 15) {
  // mélange : tire des questions de tous les thèmes
  const pool = [];
  Object.entries(THEMES).forEach(([key, t]) => {
    (t.questions || []).forEach(q => pool.push({ ...q, _theme: t.titre, _themeKey: key }));
  });
  state.currentTheme = '__random__';
  state.questions = shuffle(pool).slice(0, Math.min(nbQuestions, pool.length));
  state.qIndex = 0;
  state.score = 0;
  state.answered = false;
  renderQuestion();
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.qIndex >= total) { renderResult(); return; }
  const q = state.questions[state.qIndex];
  const themeName = state.currentTheme === '__random__'
    ? `🎲 Quiz surprise — ${q._theme}`
    : `🎯 ${THEMES[state.currentTheme].titre}`;
  const progressPct = Math.round((state.qIndex / total) * 100);
  app.innerHTML = `
    <button class="back-btn" onclick="setView('quiz')">← Quitter le quiz</button>
    <div class="card">
      <div class="quiz-header">
        <div style="font-weight:700">${themeName}</div>
        <div class="quiz-score">Score : ${state.score} / ${total}</div>
      </div>
      <div class="quiz-progress"><div style="width:${progressPct}%"></div></div>
      <div style="margin-top:18px" class="question-num">Question ${state.qIndex + 1} / ${total}</div>
      <div class="question-text">${q.enonce}</div>
      ${q.fig ? `<div class="fig-wrap">${q.fig}</div>` : ''}
      <div class="choices">
        ${q.choix.map((c, i) => `<button class="choice" data-i="${i}" onclick="answer(${i})">${c}</button>`).join('')}
      </div>
      <div id="feedback-zone"></div>
    </div>
  `;
  renderMath();
}

window.answer = function(i) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.qIndex];
  const isOk = (i === q.bonne);
  if (isOk) state.score++;
  // disable & color all
  document.querySelectorAll('.choice').forEach((btn, idx) => {
    btn.disabled = true;
    if (idx === q.bonne) btn.classList.add('correct');
    if (idx === i && !isOk) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback-zone');
  fb.innerHTML = `
    <div class="feedback ${isOk ? 'ok' : 'ko'}">
      <span class="badge">${isOk ? '✓ Bonne réponse' : '✗ Mauvaise réponse'}</span>
      <div style="margin-top:10px"><strong>Correction :</strong> ${q.explication || ('La bonne réponse est ' + q.choix[q.bonne])}</div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${state.qIndex + 1 >= state.questions.length ? '🏁 Voir le résultat' : '➡️ Question suivante'}
    </button>
  `;
  renderMath();
};

window.nextQuestion = function() {
  state.qIndex++;
  state.answered = false;
  renderQuestion();
};

function renderResult() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let medal = '🎯', msg = '';
  if (pct === 100) { medal = '🏆'; msg = 'Parfait ! Tu maîtrises ce thème.'; }
  else if (pct >= 80) { medal = '🥇'; msg = 'Excellent travail !'; }
  else if (pct >= 60) { medal = '🥈'; msg = 'Bien joué, continue à t\'entraîner !'; }
  else if (pct >= 40) { medal = '🥉'; msg = 'Pas mal, mais il faut continuer.'; }
  else                { medal = '💪'; msg = 'Reviens sur la leçon et réessaie !'; }

  const themeName = state.currentTheme === '__random__'
    ? 'Quiz surprise'
    : THEMES[state.currentTheme].titre;
  const retryAction = state.currentTheme === '__random__'
    ? `startRandomQuiz()`
    : `startQuiz('${state.currentTheme}')`;

  app.innerHTML = `
    <div class="card result">
      <div class="medal">${medal}</div>
      <h2 style="margin:0">${themeName} — Résultat</h2>
      <div class="score-big">${state.score} / ${total}</div>
      <div style="font-size:18px;color:var(--c-muted);margin-bottom:8px">${pct}%</div>
      <div class="msg">${msg}</div>
      <div class="actions">
        <button class="btn btn-primary" onclick="${retryAction}">🔁 Recommencer</button>
        <button class="btn btn-ghost" onclick="setView('quiz')">📚 Autre thème</button>
        ${state.currentTheme !== '__random__' ? `<button class="btn btn-accent" onclick="setView('lessons','${state.currentTheme}')">📘 Revoir la leçon</button>` : ''}
        <button class="btn btn-success" onclick="setView('home')">🏠 Accueil</button>
      </div>
    </div>
  `;
}

// ---- Lancement ----
window.setView = setView;
setView('home');
</script>

</body>
</html>
